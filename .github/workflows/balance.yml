name: Balance Stock

on:
  workflow_dispatch:
    inputs:
      sku:
        description: "Base SKU(s), space-separated (e.g. ITBISA-LED-5MM or SKU1 SKU2 SKU3)"
        required: true
        type: string
      dry_run:
        description: "Dry run (no API writes)"
        required: false
        default: "false"
        type: string

concurrency:
  group: stock-balance
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  balance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Overlay data/ from bot-state
        run: |
          git fetch origin bot-state || true
          if git show-ref --verify --quiet refs/remotes/origin/bot-state; then
            mkdir -p data
            git --work-tree=. checkout origin/bot-state -- data/ 2>/dev/null || true
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock balance
        env:
          SKU_ARG: ${{ inputs.sku }}
          DRY_RUN: ${{ inputs.dry_run }}
          SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
          TIKTOKSHOP_APP_KEY: ${{ secrets.TIKTOKSHOP_APP_KEY }}
          TIKTOKSHOP_APP_SECRET: ${{ secrets.TIKTOKSHOP_APP_SECRET }}
          TIKTOKSHOP_SHOP_ID: ${{ secrets.TIKTOKSHOP_SHOP_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            python scripts/stock_balance.py --dry-run --sku $SKU_ARG
          else
            python scripts/stock_balance.py --sku $SKU_ARG
          fi

      - name: Commit token state to bot-state
        if: always()
        run: |
          if [ ! -d data ]; then
            echo "No data/ directory to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin bot-state || true
          if git show-ref --verify --quiet refs/remotes/origin/bot-state; then
            git checkout -B bot-state origin/bot-state
          else
            git checkout --orphan bot-state
            git rm -rf . 2>/dev/null || true
          fi
          mkdir -p data
          git add -f data/*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No token/state changes to commit"
          else
            git commit -m "stock-balance: update tokens"
            git push origin bot-state
          fi