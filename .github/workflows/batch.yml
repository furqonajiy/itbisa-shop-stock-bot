name: Batch Stock Commands

# Executes multiple Telegram-style stock commands sequentially in one Actions run.
on:
  workflow_dispatch:
    inputs:
      commands:
        description: "One /command per line. Supported: stock_get, stock_set, stock_balance, stock_low, harga_set, variant_set, weight_set."
        required: true
        type: string

# Batch runs can contain writes. Queue them instead of cancelling mid-run.
concurrency:
  group: stock-batch
  cancel-in-progress: false

jobs:
  batch-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Sync data/ from bot-state
        run: |
          if git ls-remote --exit-code --heads origin bot-state >/dev/null 2>&1; then
            echo "bot-state branch exists — overlaying data/"
            git fetch origin bot-state
            git checkout origin/bot-state -- data/ || echo "no data/ on bot-state yet"
          else
            echo "bot-state branch not found — using data/ from main"
          fi
          ls -la data/ || true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run command batch
        env:
          SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
          TIKTOKSHOP_APP_KEY: ${{ secrets.TIKTOKSHOP_APP_KEY }}
          TIKTOKSHOP_APP_SECRET: ${{ secrets.TIKTOKSHOP_APP_SECRET }}
          TIKTOKSHOP_SHOP_ID: ${{ secrets.TIKTOKSHOP_SHOP_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INPUT_COMMANDS: ${{ inputs.commands }}
        run: |
          set -e
          printf '%s\n' "$INPUT_COMMANDS" > batch_commands.txt
          python scripts/command_batch.py --commands-file batch_commands.txt

      - name: Commit token rotation to bot-state
        if: always()
        run: |
          git config user.name  "itbisa-bot[bot]"
          git config user.email "itbisa-bot@users.noreply.github.com"

          TMP=$(mktemp -d)
          cp data/shopee_tokens.json "$TMP/" 2>/dev/null || true
          cp data/tiktokshop_tokens.json "$TMP/" 2>/dev/null || true
          cp data/stock_low_state.json "$TMP/" 2>/dev/null || true

          if [ ! -f "$TMP/shopee_tokens.json" ] && [ ! -f "$TMP/tiktokshop_tokens.json" ] && [ ! -f "$TMP/stock_low_state.json" ]; then
            echo "No state files to commit."
            rm -rf "$TMP"
            exit 0
          fi

          git fetch origin bot-state || true
          if git rev-parse --verify origin/bot-state >/dev/null 2>&1; then
            git checkout -B bot-state origin/bot-state
          else
            git checkout --orphan bot-state
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p data
          cp "$TMP/shopee_tokens.json" data/ 2>/dev/null || true
          cp "$TMP/tiktokshop_tokens.json" data/ 2>/dev/null || true
          cp "$TMP/stock_low_state.json" data/ 2>/dev/null || true
          rm -rf "$TMP"

          [ -f data/shopee_tokens.json ] && git add data/shopee_tokens.json
          [ -f data/tiktokshop_tokens.json ] && git add data/tiktokshop_tokens.json
          [ -f data/stock_low_state.json ] && git add data/stock_low_state.json

          git diff --staged --quiet || git commit -m "chore(state): refresh tokens after batch run"
          git push --force-with-lease origin bot-state
