name: Get Stock

# Read-only stock inspection. Triggered:
#   • Manually from the Actions tab with a base SKU
#   • Via workflow_dispatch from the Telegram bot Worker (/stock_get SKU)
#
# Tokens may rotate during this read run, so we still need write access
# to bot-state to persist refreshed token files.
on:
  workflow_dispatch:
    inputs:
      sku:
        description: "SKU to inspect."
        required: true
        type: string

# Separate group from stock-set so a get query never cancels a set.
# Newer get queries DO cancel older ones — operator only cares about the latest.
concurrency:
  group: stock-get
  cancel-in-progress: true

jobs:
  get-stock:
    runs-on: ubuntu-latest
    # Read-only query (cancel-in-progress: true) — a runaway-safe cap is fine.
    timeout-minutes: 10

    # The bot reads + writes data/ on the bot-state branch (token rotation).
    permissions:
      contents: write

    steps:
      # ----------------------------------------------------
      # 1. Checkout main (source code)
      # ----------------------------------------------------
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      # ----------------------------------------------------
      # 2. Overlay state from bot-state if it exists
      # ----------------------------------------------------
      - name: Sync data/ from bot-state
        run: |
          if git ls-remote --exit-code --heads origin bot-state >/dev/null 2>&1; then
            echo "bot-state branch exists — overlaying data/"
            git fetch origin bot-state
            git checkout origin/bot-state -- data/ || echo "no data/ on bot-state yet"
          else
            echo "bot-state branch not found — using data/ from main"
          fi
          ls -la data/ || true

      # ----------------------------------------------------
      # 3. Python env
      # ----------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ----------------------------------------------------
      # 4. Run the script
      # ----------------------------------------------------
      - name: Run stock get
        env:
          SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
          TIKTOKSHOP_APP_KEY: ${{ secrets.TIKTOKSHOP_APP_KEY }}
          TIKTOKSHOP_APP_SECRET: ${{ secrets.TIKTOKSHOP_APP_SECRET }}
          TIKTOKSHOP_SHOP_ID: ${{ secrets.TIKTOKSHOP_SHOP_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INPUT_SKU: ${{ inputs.sku }}
        run: |
          set -e
          python scripts/stock_get.py --sku "$INPUT_SKU"

      # ----------------------------------------------------
      # 5. Persist refreshed tokens back to bot-state
      # ----------------------------------------------------
      # Read-only operation, but token refresh may have rotated access_token
      # and/or refresh_token. Persist any data/ changes back to bot-state.
      - name: Commit token rotation to bot-state
        if: always()
        run: |
          git config user.name  "itbisa-bot[bot]"
          git config user.email "itbisa-bot@users.noreply.github.com"

          # Stock bot state is token files only. Even dry-run can rotate tokens
          # during catalog reads, so persist token changes after every run.
          TMP=$(mktemp -d)
          cp data/shopee_tokens.json "$TMP/" 2>/dev/null || true
          cp data/tiktokshop_tokens.json "$TMP/" 2>/dev/null || true

          if [ ! -f "$TMP/shopee_tokens.json" ] && [ ! -f "$TMP/tiktokshop_tokens.json" ]; then
            echo "No token files to commit."
            rm -rf "$TMP"
            exit 0
          fi

          git fetch origin bot-state || true
          if git rev-parse --verify origin/bot-state >/dev/null 2>&1; then
            git checkout -B bot-state origin/bot-state
          else
            git checkout --orphan bot-state
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p data
          cp "$TMP/shopee_tokens.json" data/ 2>/dev/null || true
          cp "$TMP/tiktokshop_tokens.json" data/ 2>/dev/null || true
          rm -rf "$TMP"

          [ -f data/shopee_tokens.json ] && git add data/shopee_tokens.json
          [ -f data/tiktokshop_tokens.json ] && git add data/tiktokshop_tokens.json

          git diff --staged --quiet || git commit -m "chore(state): refresh tokens after stock-get run"
          git push --force-with-lease origin bot-state