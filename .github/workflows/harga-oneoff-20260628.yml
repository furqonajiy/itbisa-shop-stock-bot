name: One-off Harga Set 2026-06-28

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/harga-oneoff-20260628.yml"
  workflow_dispatch:

concurrency:
  group: harga-oneoff-20260628
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  harga:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Overlay data from bot-state
        run: |
          git fetch origin bot-state || true
          if git show-ref --verify --quiet refs/remotes/origin/bot-state; then
            mkdir -p data
            git --work-tree=. checkout origin/bot-state -- data/ 2>/dev/null || true
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run harga set
        env:
          SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
          TIKTOKSHOP_APP_KEY: ${{ secrets.TIKTOKSHOP_APP_KEY }}
          TIKTOKSHOP_APP_SECRET: ${{ secrets.TIKTOKSHOP_APP_SECRET }}
          TIKTOKSHOP_SHOP_ID: ${{ secrets.TIKTOKSHOP_SHOP_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/harga_set.py \
            --sku "ITBISA-7SEGMENT-CATHODE-RED-0.56-1BIT" \
            --tiers 1 1699 50 1649 150 1599 750 1549

      - name: Commit token state to bot-state
        if: always()
        run: |
          if [ ! -d data ]; then
            echo "No data/ directory to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin bot-state || true
          if git show-ref --verify --quiet refs/remotes/origin/bot-state; then
            git checkout -B bot-state origin/bot-state
          else
            git checkout --orphan bot-state
            git rm -rf . 2>/dev/null || true
          fi
          mkdir -p data
          git add -f data/*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No token/state changes to commit"
          else
            git commit -m "harga-set: update tokens"
            git push origin bot-state
          fi
