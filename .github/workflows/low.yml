name: Low Stock

# Read-only low-stock report. Lists every base SKU whose combined on-hand stock
# (Shopee + TikTok Shop) is below LOW_STOCK_THRESHOLD. Triggered:
#   • From the Telegram bot Worker (/stock_low)
#   • Manually from the Actions tab
#
# The report itself (a full two-platform catalog scan) is throttled in the bot
# to once per LOW_STOCK_MIN_INTERVAL_HOURS (24h); a trigger inside that window
# skips the scan and just replies that the report was already generated. Tokens
# may rotate during the read, so we still need write access to bot-state.
on:
  workflow_dispatch:

# Read-only query: a newer request cancels an older one (operator only cares
# about the latest report). Separate group so it never cancels set/balance.
concurrency:
  group: stock-low
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  low-stock:
    runs-on: ubuntu-latest
    # Read-only query (cancel-in-progress: true) — a runaway-safe cap is fine.
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Overlay data/ from bot-state
        run: |
          git fetch origin bot-state || true
          if git show-ref --verify --quiet refs/remotes/origin/bot-state; then
            mkdir -p data
            git --work-tree=. checkout origin/bot-state -- data/ 2>/dev/null || true
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run low-stock report
        env:
          SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
          TIKTOKSHOP_APP_KEY: ${{ secrets.TIKTOKSHOP_APP_KEY }}
          TIKTOKSHOP_APP_SECRET: ${{ secrets.TIKTOKSHOP_APP_SECRET }}
          TIKTOKSHOP_SHOP_ID: ${{ secrets.TIKTOKSHOP_SHOP_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/stock_low.py

      - name: Commit token + throttle state to bot-state
        if: always()
        run: |
          if [ ! -d data ]; then
            echo "No data/ directory to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin bot-state || true
          if git show-ref --verify --quiet refs/remotes/origin/bot-state; then
            git checkout -B bot-state origin/bot-state
          else
            git checkout --orphan bot-state
            git rm -rf . 2>/dev/null || true
          fi
          mkdir -p data
          git add -f data/*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No token/throttle changes to commit"
          else
            git commit -m "stock-low: update tokens + throttle"
            git push origin bot-state
          fi
