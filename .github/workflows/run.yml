name: Set Stock

# No cron — stock updates are deliberate operator actions.
# Triggered either:
#   • Manually from the Actions tab (with optional inputs)
#   • Via workflow_dispatch from the Telegram bot Worker
#     (/stock_set SKU PIECES)
on:
  workflow_dispatch:
    inputs:
      sku:
        description: "Base SKU (single-SKU mode). Leave empty for Excel mode."
        required: false
        type: string
        default: ""
      pieces:
        description: "Total pieces (single-SKU mode). Leave empty for Excel mode."
        required: false
        type: string
        default: ""
      excel_path:
        description: "Path to Excel file (Excel mode). Default: stock.xlsx"
        required: false
        type: string
        default: "stock.xlsx"
      dry_run:
        description: "Dry run — print plan without calling write APIs."
        required: false
        type: boolean
        default: false

# Cancel in-flight runs of this workflow if a new dispatch arrives.
# Stock is not order-sensitive, so newer always wins.
concurrency:
  group: stock-set
  cancel-in-progress: true

jobs:
  set-stock:
    runs-on: ubuntu-latest

    # The bot reads + writes data/ on the bot-state branch.
    permissions:
      contents: write

    steps:
      # ----------------------------------------------------
      # 1. Checkout main (source code)
      # ----------------------------------------------------
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # ----------------------------------------------------
      # 2. Overlay state from bot-state if it exists
      # ----------------------------------------------------
      # On first-ever run, bot-state may not exist — fall back to
      # whatever data/ files were committed to main.
      - name: Sync data/ from bot-state
        run: |
          if git ls-remote --exit-code --heads origin bot-state >/dev/null 2>&1; then
            echo "bot-state branch exists — overlaying data/"
            git fetch origin bot-state
            git checkout origin/bot-state -- data/ || echo "no data/ on bot-state yet"
          else
            echo "bot-state branch not found — using data/ from main"
          fi
          ls -la data/ || true

      # ----------------------------------------------------
      # 3. Python env
      # ----------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ----------------------------------------------------
      # 4. Run the script
      # ----------------------------------------------------
      # API base URLs live in src/config.py. Secrets below are only
      # credentials and operator/runtime configuration.
      - name: Run stock set
        env:
          SHOPEE_PARTNER_ID:                      ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY:                     ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_SHOP_ID:                         ${{ secrets.SHOPEE_SHOP_ID }}
          TIKTOKSHOP_APP_KEY:                     ${{ secrets.TIKTOKSHOP_APP_KEY }}
          TIKTOKSHOP_APP_SECRET:                  ${{ secrets.TIKTOKSHOP_APP_SECRET }}
          TIKTOKSHOP_SHOP_ID:                     ${{ secrets.TIKTOKSHOP_SHOP_ID }}
          TIKTOKSHOP_SMALL_PACK_RESERVE_PIECES:   ${{ secrets.TIKTOKSHOP_SMALL_PACK_RESERVE_PIECES }}
          # Legacy fallback during transition; prefer TIKTOKSHOP_SMALL_PACK_RESERVE_PIECES.
          TIKTOKSHOP_MAX_UNITS_PER_VARIANT:       ${{ secrets.TIKTOKSHOP_MAX_UNITS_PER_VARIANT }}
          TELEGRAM_BOT_TOKEN:                     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:                       ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_SKUS_PER_RUN:                       ${{ secrets.MAX_SKUS_PER_RUN }}
          INPUT_SKU:                              ${{ inputs.sku }}
          INPUT_PIECES:                           ${{ inputs.pieces }}
          INPUT_EXCEL_PATH:                       ${{ inputs.excel_path }}
          INPUT_DRY_RUN:                          ${{ inputs.dry_run }}
        run: |
          set -e
          DRY_FLAG=""
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          if [ -n "$INPUT_SKU" ] && [ -n "$INPUT_PIECES" ]; then
            echo "Single-SKU mode: $INPUT_SKU = $INPUT_PIECES pcs"
            python scripts/stock_set.py \
              --sku "$INPUT_SKU" \
              --pieces "$INPUT_PIECES" \
              $DRY_FLAG
          else
            echo "Excel mode: $INPUT_EXCEL_PATH"
            python scripts/stock_set.py "$INPUT_EXCEL_PATH" $DRY_FLAG
          fi

      # ----------------------------------------------------
      # 5. Persist refreshed tokens back to bot-state
      # ----------------------------------------------------
      # Stock bot does NOT track processed orders, so the only
      # mutable state in data/ is the two token files.
      - name: Commit token rotation to bot-state
        if: always() && !inputs.dry_run
        run: |
          # Skip if nothing changed.
          if [ -z "$(git status --porcelain data/)" ]; then
            echo "No state changes to commit."
            exit 0
          fi

          git config user.name  "itbisa-bot[bot]"
          git config user.email "itbisa-bot@users.noreply.github.com"

          # Move the data/ changes onto bot-state.
          git stash push -- data/
          git fetch origin bot-state || true
          git checkout -B bot-state origin/bot-state 2>/dev/null || git checkout --orphan bot-state
          git stash pop

          git add data/
          git commit -m "chore(state): refresh tokens after stock-set run" || echo "Nothing to commit"
          git push --force-with-lease origin bot-state
