name: Update Inventory

# No cron — inventory updates are deliberate operator actions.
# Triggered either:
#   • Manually from the Actions tab (with optional inputs)
#   • Via workflow_dispatch from the Telegram bot Worker
#     (/update_inventory SKU PIECES)
on:
  workflow_dispatch:
    inputs:
      sku:
        description: "Base SKU (single-SKU mode). Leave empty for Excel mode."
        required: false
        type: string
        default: ""
      pieces:
        description: "Total pieces (single-SKU mode). Leave empty for Excel mode."
        required: false
        type: string
        default: ""
      excel_path:
        description: "Path to Excel file (Excel mode). Default: inventory.xlsx"
        required: false
        type: string
        default: "inventory.xlsx"
      dry_run:
        description: "Dry run — print plan without calling write APIs."
        required: false
        type: boolean
        default: false

# Cancel in-flight runs of this workflow if a new dispatch arrives.
# Inventory is not order-sensitive, so newer always wins.
concurrency:
  group: update-inventory
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    # The bot reads + writes data/ on the bot-state branch.
    permissions:
      contents: write

    steps:
      # ----------------------------------------------------
      # 1. Checkout main (source code)
      # ----------------------------------------------------
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # ----------------------------------------------------
      # 2. Overlay state from bot-state if it exists
      # ----------------------------------------------------
      # On first-ever run, bot-state may not exist — fall back to
      # whatever data/ files were committed to main (typically empty
      # tokens placeholders that the operator filled before push).
      - name: Sync data/ from bot-state
        run: |
          if git ls-remote --exit-code --heads origin bot-state >/dev/null 2>&1; then
            echo "bot-state branch exists — overlaying data/"
            git fetch origin bot-state
            git checkout origin/bot-state -- data/ || echo "no data/ on bot-state yet"
          else
            echo "bot-state branch not found — using data/ from main"
          fi
          ls -la data/ || true

      # ----------------------------------------------------
      # 3. Python env
      # ----------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ----------------------------------------------------
      # 4. Run the script
      # ----------------------------------------------------
      # Branch on whether `sku` is provided. The Telegram Worker
      # always provides sku+pieces; manual UI dispatch may use either.
      - name: Run inventory update
        env:
          SHOPEE_PARTNER_ID:           ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY:          ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_SHOP_ID:              ${{ secrets.SHOPEE_SHOP_ID }}
          SHOPEE_API_BASE_URL:         ${{ secrets.SHOPEE_API_BASE_URL }}
          TIKTOKSHOP_APP_KEY:          ${{ secrets.TIKTOKSHOP_APP_KEY }}
          TIKTOKSHOP_APP_SECRET:       ${{ secrets.TIKTOKSHOP_APP_SECRET }}
          TIKTOKSHOP_SHOP_ID:          ${{ secrets.TIKTOKSHOP_SHOP_ID }}
          TIKTOKSHOP_AUTH_BASE_URL:    ${{ secrets.TIKTOKSHOP_AUTH_BASE_URL }}
          TIKTOKSHOP_OPEN_API_BASE_URL: ${{ secrets.TIKTOKSHOP_OPEN_API_BASE_URL }}
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_SKUS_PER_RUN:            ${{ secrets.MAX_SKUS_PER_RUN }}
          INPUT_SKU:        ${{ inputs.sku }}
          INPUT_PIECES:     ${{ inputs.pieces }}
          INPUT_EXCEL_PATH: ${{ inputs.excel_path }}
          INPUT_DRY_RUN:    ${{ inputs.dry_run }}
        run: |
          set -e
          DRY_FLAG=""
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          if [ -n "$INPUT_SKU" ] && [ -n "$INPUT_PIECES" ]; then
            echo "Single-SKU mode: $INPUT_SKU = $INPUT_PIECES pcs"
            python scripts/update_inventory.py \
              --sku "$INPUT_SKU" \
              --pieces "$INPUT_PIECES" \
              $DRY_FLAG
          else
            echo "Excel mode: $INPUT_EXCEL_PATH"
            python scripts/update_inventory.py "$INPUT_EXCEL_PATH" $DRY_FLAG
          fi

      # ----------------------------------------------------
      # 5. Persist refreshed tokens back to bot-state
      # ----------------------------------------------------
      # Inventory bot does NOT track processed orders, so the only
      # mutable state in data/ is the two token files (rotated when
      # access_token gets refreshed). We commit them back so the next
      # run picks up the fresh refresh_token.
      - name: Commit token rotation to bot-state
        if: always() && !inputs.dry_run
        run: |
          # Skip if nothing changed.
          if [ -z "$(git status --porcelain data/)" ]; then
            echo "No state changes to commit."
            exit 0
          fi

          git config user.name  "itbisa-bot[bot]"
          git config user.email "itbisa-bot@users.noreply.github.com"

          # Move the data/ changes onto bot-state.
          git stash push -- data/
          git fetch origin bot-state || true
          git checkout -B bot-state origin/bot-state 2>/dev/null || git checkout --orphan bot-state
          git stash pop

          git add data/
          git commit -m "chore(state): refresh tokens after inventory run" || echo "Nothing to commit"
          git push --force-with-lease origin bot-state
